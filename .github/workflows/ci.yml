name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチ/PRへの新しい push 時に、進行中の古い実行をキャンセルする。
# main への push は通常 1 件のため実害なく、PR の待ち時間とランナー消費を削減する。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: テスト実行
        run: cargo test --workspace
      # mcp は非デフォルト feature のため --workspace では検証されない。
      # 過去に rmcp API 追従漏れでコンパイル不能のまま放置された経緯があり
      # （v_and_v/p8_review.md）、ここで明示的にビルド・テストして再発を防ぐ。
      - name: MCP featureテスト実行
        run: cargo test -p squid-n-mcp --features mcp
      # gui は非デフォルト feature のため --workspace では検証されない。
      # GUI コードのコンパイル漏れ（網羅的 match 等）の検知に加え、gui ゲート内の
      # ユニットテスト（viewer のカメラ計算等）も実行する（build は test に含まれる）。
      - name: GUI featureテスト実行
        run: cargo test -p squid-n-app --features gui

  clippy:
    name: Clippy静的解析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy実行
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # 非デフォルト feature の mcp（bin ターゲット含む）も静的解析の対象にする。
      - name: Clippy実行（MCP feature）
        run: cargo clippy -p squid-n-mcp --all-targets --features mcp --locked -- -D warnings
      # 非デフォルト feature の gui（eframe 経由の GUI コード）も静的解析の対象にする。
      # 過去に squid-n-app の GUI コードが網羅的 match 漏れでコンパイル不能のまま
      # 放置された経緯があり（mn_view.rs）、ここで明示的に検証して再発を防ぐ。
      - name: Clippy実行（GUI feature）
        run: cargo clippy -p squid-n-app --all-targets --features gui --locked -- -D warnings

  fmt:
    name: フォーマットチェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: フォーマット確認
        run: cargo fmt --all -- --check

  audit:
    name: 脆弱性確認
    runs-on: ubuntu-latest
    # rustsec/audit-check は脆弱性が0件でも unmaintained 等の警告を
    # Check Run として書き込むため checks: write が必須。GitHub の新規リポジトリは
    # デフォルトで GITHUB_TOKEN が read-only になり、権限不足でジョブ自体が失敗する
    # （"Resource not accessible by integration"）。最小権限でここに明示する。
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # quick-xml の DoS 脆弱性。直接依存は 0.41 に更新済みだが、
          # wayland-scanner / zbus_xml（eframe 経由の推移的依存）が
          # まだ quick-xml ^0.39 を要求しているため、上流の更新待ち。
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195

  dependency-check:
    name: 依存性チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo-deny実行
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
