name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチ/PRへの新しい push 時に、進行中の古い実行をキャンセルする。
# main への push は通常 1 件のため実害なく、PR の待ち時間とランナー消費を削減する。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: テスト実行
        run: cargo test --workspace

  clippy:
    name: Clippy静的解析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy実行
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: フォーマットチェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: フォーマット確認
        run: cargo fmt --all -- --check

  audit:
    name: 脆弱性確認
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # quick-xml の DoS 脆弱性。直接依存は 0.41 に更新済みだが、
          # wayland-scanner / zbus_xml（eframe 経由の推移的依存）が
          # まだ quick-xml ^0.39 を要求しているため、上流の更新待ち。
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195

  dependency-check:
    name: 依存性チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo-deny実行
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
