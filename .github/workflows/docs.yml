name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cloudflare Pages へのデプロイには以下のリポジトリシークレットが必要:
#   CLOUDFLARE_API_TOKEN : Pages の編集権限を持つ API トークン
#   CLOUDFLARE_ACCOUNT_ID: Cloudflare アカウント ID
# また、Cloudflare ダッシュボード（または wrangler）で
# プロジェクト名 `squid-n-docs` を事前作成しておくこと。

env:
  MDBOOK_VERSION: "0.4.52"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          cargo install mdbook --version "${MDBOOK_VERSION}" --locked

      - name: Build book
        run: mdbook build

      - name: Build API docs (rustdoc)
        run: |
          cargo doc --workspace --no-deps
          # rustdoc 出力を book/api へ配置し、/api へアクセスで core クレートへリダイレクト
          mkdir -p book/api
          cp -r target/doc/. book/api/
          echo '<meta http-equiv="refresh" content="0; url=squid_n_core/index.html">' > book/api/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: book
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: book
          path: book

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: squid-n-docs
          directory: book
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
