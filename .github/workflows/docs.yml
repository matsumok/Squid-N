name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# デプロイ（main への push）は従来どおり直列。PR のビルド検証は ref ごとに分離し、
# PR の連続 push が pending 中のデプロイ実行を置き換えて取り消さないようにする
# （同一 concurrency group では pending は常に 1 件で、新しい実行が古い pending を
# cancel-in-progress: false でも取り消すため）。
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MDBOOK_VERSION: "0.4.52"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustdoc 用の依存ビルドをキャッシュ（ci.yml と同じアクション）。
      - uses: Swatinem/rust-cache@v2

      # 公式 release の prebuilt バイナリを使う（cargo install のソースビルド
      # 数分に対し数秒で完了し、main への push 時のデプロイも同じだけ速くなる）。
      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
          mdbook --version

      - name: Build book
        run: mdbook build

      - name: Build API docs (rustdoc)
        run: |
          cargo doc --workspace --no-deps
          # rustdoc 出力を book/api へ配置し、/api へアクセスで core クレートへリダイレクト
          mkdir -p book/api
          cp -r target/doc/. book/api/
          echo '<meta http-equiv="refresh" content="0; url=squid_n_core/index.html">' > book/api/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    # PR ではビルド検証のみ行いデプロイしない。またフォークは Pages 未構成で
    # デプロイが必ず失敗するため、upstream リポジトリに限定する。
    if: github.event_name != 'pull_request' && github.repository == 'hrntsm/Squid-n'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
