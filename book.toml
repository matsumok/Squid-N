[book]
title = "Squid-N ドキュメント"
description = "日本の建築構造計算一貫プログラム Squid-N の設計仕様・検証(V&V)・開発ドキュメント"
authors = ["Squid-N contributors"]
language = "ja"
src = "docs"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/hrntsm/squid-n"
edit-url-template = "https://github.com/hrntsm/squid-n/edit/main/docs/{path}"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
